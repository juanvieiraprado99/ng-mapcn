name: Create Release on Version Change

on:
  push:
    branches:
      - main
    paths:
      - 'projects/ng-mapcn/package.json'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: package-version
        run: |
          VERSION=$(node -p "require('./projects/ng-mapcn/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if tag exists
        id: tag-check
        run: |
          VERSION=${{ steps.package-version.outputs.version }}
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build categorized changelog
        id: changelog
        if: steps.tag-check.outputs.exists == 'false'
        run: |
          VERSION=${{ steps.package-version.outputs.version }}
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            RAW=$(git log --pretty=format:"%s|||%h" | head -50)
          else
            RAW=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s|||%h")
          fi

          echo "$RAW" | python3 .github/scripts/build_changelog.py "$VERSION" > /tmp/release_body.md
          echo "body_file=/tmp/release_body.md" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.tag-check.outputs.exists == 'false'
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.package-version.outputs.version }}
          name: v${{ steps.package-version.outputs.version }}
          bodyFile: ${{ steps.changelog.outputs.body_file }}
          draft: false
          prerelease: ${{ contains(steps.package-version.outputs.version, 'beta') || contains(steps.package-version.outputs.version, 'alpha') || contains(steps.package-version.outputs.version, 'rc') }}

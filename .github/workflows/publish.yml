name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Remove local ng-mapcn dependency (not present in CI)
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          delete pkg.dependencies['ng-mapcn'];
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          if (lock.packages && lock.packages['']) {
            delete lock.packages[''].dependencies['ng-mapcn'];
          }
          if (lock.dependencies && lock.dependencies['ng-mapcn']) {
            delete lock.dependencies['ng-mapcn'];
          }
          if (lock.packages && lock.packages['node_modules/ng-mapcn']) {
            delete lock.packages['node_modules/ng-mapcn'];
          }
          fs.writeFileSync('package-lock.json', JSON.stringify(lock, null, 2));
          "

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib:prod

      - name: Publish to npm
        working-directory: dist/ng-mapcn
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if echo "$VERSION" | grep -q '-'; then
            npm publish --tag beta --access public
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

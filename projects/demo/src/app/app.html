<div class="app-container">
  <header>
    <div class="header-top">
      <h1>{{ title }}</h1>
      <button
        type="button"
        class="theme-toggle-button"
        (click)="toggleTheme()"
        [attr.aria-label]="currentTheme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
        title="{{ currentTheme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme' }}"
      >
        @if (currentTheme() === 'dark') {
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-icon">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2"></path>
            <path d="M12 20v2"></path>
            <path d="m4.93 4.93 1.41 1.41"></path>
            <path d="m17.66 17.66 1.41 1.41"></path>
            <path d="M2 12h2"></path>
            <path d="M20 12h2"></path>
            <path d="m6.34 17.66-1.41 1.41"></path>
            <path d="m19.07 4.93-1.41 1.41"></path>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-icon">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
          </svg>
        }
      </button>
    </div>
    <nav class="examples-nav">
      @for (example of examples; track example.path) {
        <a [routerLink]="example.path" 
           routerLinkActive="active"
           class="nav-link">
          {{ example.label }}
        </a>
      }
    </nav>
  </header>
  <main>
    <router-outlet></router-outlet>
  </main>
</div>

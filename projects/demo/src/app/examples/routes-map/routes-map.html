<div class="demo-container">
  <h1>Routes Map Example</h1>
  <p class="description">Mapa com rotas/paths desenhadas, incluindo rota com marcadores numerados</p>
  <div class="map-wrapper">
    <ng-map
      [mapId]="mapId"
      [center]="[-73.98, 40.75]"
      [zoom]="11.2"
      (mapReady)="onMapReady($event)"
    ></ng-map>
    <ng-map-controls
      [mapId]="mapId"
      [position]="'top-right'"
      [showZoom]="true"
    ></ng-map-controls>
    @for (route of routes; track route.id || $index) {
      <ng-route [mapId]="mapId" [config]="route"></ng-route>
    }
  </div>
</div>

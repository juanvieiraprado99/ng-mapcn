<div class="demo-container">
  <h1>Custom Style Map Example</h1>
  <p class="description">Mapa com estilo customizado</p>
  <div class="map-wrapper">
    <ng-map
      [mapId]="mapId"
      [center]="[0, 0]"
      [zoom]="2"
      [style]="customStyle"
      (mapReady)="onMapReady($event)"
    ></ng-map>
    <ng-map-controls
      [mapId]="mapId"
      [position]="'top-right'"
      [showZoom]="true"
    ></ng-map-controls>
  </div>
</div>

<div class="demo-container">
  <h1>Markers Map Example</h1>
  <p class="description">Mapa com marcadores em diferentes localizações, tamanhos e cores</p>
  <div class="map-wrapper">
    <ng-map
      [mapId]="mapId"
      [center]="[-47.16, -23.53]"
      [zoom]="12"
      (mapReady)="onMapReady($event)"
    ></ng-map>
    <ng-map-controls
      [mapId]="mapId"
      [position]="'top-right'"
      [showZoom]="true"
    ></ng-map-controls>
    @for (marker of markers; track marker.id) {
    <ng-marker [mapId]="mapId" [config]="marker"></ng-marker>
    }
    @for (route of routes; track route.id) {
    <ng-route [mapId]="mapId" [config]="route"></ng-route>
    }
  </div>
</div>

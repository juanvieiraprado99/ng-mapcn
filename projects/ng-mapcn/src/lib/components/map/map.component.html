<div #mapContainer class="ng-map-canvas"></div>

@if (!isLoaded() || loading()) {
  <div class="ng-map-loader" role="status" aria-label="Loading map">
    <span class="ng-map-loader__dot"></span>
    <span class="ng-map-loader__dot"></span>
    <span class="ng-map-loader__dot"></span>
  </div>
}

@if (mapInstance()) {
  <ng-content />
}

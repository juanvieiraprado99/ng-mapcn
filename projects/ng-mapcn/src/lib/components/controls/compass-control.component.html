<div class="ng-map-controls" [class]="getPositionClass()">
  <button
    type="button"
    class="ng-map-control-button ng-compass-button"
    (click)="onResetNorth()"
    [attr.aria-label]="config()?.compassLabel || 'Reset north'"
    title="Reset north"
  >
    <img
      class="ng-compass-image"
      [src]="getCompassImagePath()"
      [style]="getCompassRotationStyle()"
      alt="Compass"
    />
  </button>
</div>

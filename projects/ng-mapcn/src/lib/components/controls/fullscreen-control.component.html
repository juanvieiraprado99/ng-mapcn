<div class="ng-map-controls" [class]="getPositionClass()">
  <button
    #fullscreenButton
    type="button"
    class="ng-map-control-button"
    (click)="onToggleFullscreen()"
    [attr.aria-label]="
      getIsFullscreen()
        ? config()?.exitFullscreenLabel || 'Exit fullscreen'
        : config()?.fullscreenLabel || 'Enter fullscreen'
    "
    [title]="getIsFullscreen() ? 'Exit fullscreen' : 'Enter fullscreen'"
  >
    @if (!getIsFullscreen()) {
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path
        d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"
      ></path>
    </svg>
    } @else {
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path
        d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"
      ></path>
    </svg>
    }
  </button>
</div>

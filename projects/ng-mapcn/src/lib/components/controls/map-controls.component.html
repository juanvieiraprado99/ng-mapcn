<div class="ng-map-controls" [class]="getPositionClass()">
  <!-- Zoom Control -->
  @if (showZoom()) { @if (zoomConfig()?.showZoomIn !== false) {
  <button
    type="button"
    class="ng-map-control-button"
    (click)="onZoomIn()"
    [attr.aria-label]="zoomConfig()?.zoomInLabel || 'Zoom in'"
    title="Zoom in"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.35-4.35"></path>
      <line x1="11" y1="8" x2="11" y2="14"></line>
      <line x1="8" y1="11" x2="14" y2="11"></line>
    </svg>
  </button>
  } @if (zoomConfig()?.showZoomOut !== false) {
  <button
    type="button"
    class="ng-map-control-button"
    (click)="onZoomOut()"
    [attr.aria-label]="zoomConfig()?.zoomOutLabel || 'Zoom out'"
    title="Zoom out"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.35-4.35"></path>
      <line x1="8" y1="11" x2="14" y2="11"></line>
    </svg>
  </button>
  } }

  <!-- Compass Control -->
  @if (showCompass()) {
  <button
    type="button"
    class="ng-map-control-button ng-compass-button"
    (click)="onResetNorth()"
    [attr.aria-label]="compassConfig()?.compassLabel || 'Reset north'"
    title="Reset north"
  >
    <img
      class="ng-compass-image"
      [src]="getCompassImagePath()"
      [style]="getCompassRotationStyle()"
      alt="Compass"
    />
  </button>
  }

  <!-- Locate Control -->
  @if (showLocate()) {
  <button
    type="button"
    class="ng-map-control-button ng-locate-button"
    (click)="onLocate()"
    [attr.aria-label]="locateConfig()?.locateLabel || 'Locate me'"
    title="Locate me"
  >
    <img class="ng-locate-image" [src]="getLocateImagePath()" alt="Locate me" />
  </button>
  }

  <!-- Fullscreen Control -->
  @if (showFullscreen()) {
  <button
    #fullscreenButton
    type="button"
    class="ng-map-control-button"
    (click)="onToggleFullscreen()"
    [attr.aria-label]="
      getIsFullscreen()
        ? fullscreenConfig()?.exitFullscreenLabel || 'Exit fullscreen'
        : fullscreenConfig()?.fullscreenLabel || 'Enter fullscreen'
    "
    [title]="getIsFullscreen() ? 'Exit fullscreen' : 'Enter fullscreen'"
  >
    @if (!getIsFullscreen()) {
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path
        d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"
      ></path>
    </svg>
    } @else {
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path
        d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"
      ></path>
    </svg>
    }
  </button>
  }
</div>

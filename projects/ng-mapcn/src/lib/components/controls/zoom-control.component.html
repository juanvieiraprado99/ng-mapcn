<div class="ng-map-controls" [class]="getPositionClass()">
  <button
    type="button"
    class="ng-map-control-button"
    (click)="onZoomIn()"
    [attr.aria-label]="config()?.zoomInLabel || 'Zoom in'"
    title="Zoom in"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.35-4.35"></path>
      <line x1="11" y1="8" x2="11" y2="14"></line>
      <line x1="8" y1="11" x2="14" y2="11"></line>
    </svg>
  </button>
  <button
    type="button"
    class="ng-map-control-button"
    (click)="onZoomOut()"
    [attr.aria-label]="config()?.zoomOutLabel || 'Zoom out'"
    title="Zoom out"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.35-4.35"></path>
      <line x1="8" y1="11" x2="14" y2="11"></line>
    </svg>
  </button>
</div>
